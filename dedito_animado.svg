      <line x1="393" y1="174" x2="411" y2="174" stroke="#E0C898" stroke-width="1" stroke-linecap="round"/>
      <line x1="394" y1="186" x2="410" y2="186" stroke="#E0C898" stroke-width="0.8" stroke-linecap="round"/>
    </g>

    <!-- HEAD -->
    <rect x="268" y="208" width="144" height="128" rx="26" fill="#FDE8C8" stroke="#E8D5B7" stroke-width="0.5"/>
    <rect x="282" y="215" width="118" height="28" rx="17" fill="white" opacity="0.22"/>
    <circle cx="284" cy="298" r="13" fill="#F4A460" opacity="0.34"/>
    <circle cx="396" cy="298" r="13" fill="#F4A460" opacity="0.34"/>
    <rect x="268" y="254" width="14" height="9" rx="4" fill="#c41212"/>
    <rect x="398" y="254" width="14" height="9" rx="4" fill="#c41212"/>
    <rect x="328" y="254" width="24" height="9" rx="4" fill="#c41212"/>
    <circle cx="308" cy="258" r="26" fill="#c41212"/>
    <circle cx="308" cy="258" r="20" fill="#1a1a1a"/>
    <circle cx="308" cy="258" r="15" fill="#1C2340"/>
    <circle cx="316" cy="250" r="5.5" fill="white" opacity="0.9"/>
    <circle cx="313" cy="247" r="2" fill="white" opacity="0.65"/>
    <circle cx="372" cy="258" r="26" fill="#c41212"/>
    <circle cx="372" cy="258" r="20" fill="#1a1a1a"/>
    <circle cx="372" cy="258" r="15" fill="#1C2340"/>
    <circle cx="380" cy="250" r="5.5" fill="white" opacity="0.9"/>
    <circle cx="377" cy="247" r="2" fill="white" opacity="0.65"/>
    <circle cx="340" cy="282" r="4.5" fill="#E8A480" opacity="0.72"/>
    <path d="M320 300 Q340 318 360 300" fill="none" stroke="#c41212" stroke-width="3.5" stroke-linecap="round"/>

    <!-- LEFT FOOT: kicks/swings from top-center (316,494) -->
    <g id="left-foot">
      <animateTransform attributeName="transform" type="rotate"
        values="0,316,494; -25,316,494; 0,316,494; 12,316,494; 0,316,494"
        dur="1.0s" begin="0s" repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
        keyTimes="0;0.25;0.5;0.75;1"/>
      <rect x="298" y="494" width="36" height="20" rx="10" fill="#c41212"/>
    </g>

    <!-- RIGHT FOOT: opposite phase (364,494) -->
    <g id="right-foot">
      <animateTransform attributeName="transform" type="rotate"
        values="0,364,494; 25,364,494; 0,364,494; -12,364,494; 0,364,494"
        dur="1.0s" begin="0.5s" repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
        keyTimes="0;0.25;0.5;0.75;1"/>
