      <line x1="325" y1="156" x2="345" y2="156" stroke="#E0C898" stroke-width="0.8" stroke-linecap="round"/>
      <rect x="320" y="42" width="30" height="23" rx="10" fill="white" stroke="#DDD8D0" stroke-width="0.5"/>
      <rect x="311" y="63" width="48" height="11" rx="5" fill="white" stroke="#DDD8D0" stroke-width="0.5"/>
      <text x="335" y="54" text-anchor="middle" dominant-baseline="central" fill="#c41212" font-size="12" font-weight="bold" font-family="Montserrat,sans-serif">4</text>
    </g>

    <!-- F3: Ring -->
    <g id="f3">
