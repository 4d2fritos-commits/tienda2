<svg width="680" height="548" viewBox="0 0 680 548" xmlns="http://www.w3.org/2000/svg">

  <!-- Shadow (pulses subtly) -->
  <ellipse cx="340" cy="522" rx="88" ry="13" fill="#1a1a1a" opacity="0.18">
    <animate attributeName="rx" values="88;72;88" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
    <animate attributeName="opacity" values="0.18;0.08;0.18" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
  </ellipse>

  <!-- ===== ENTIRE CHARACTER floats up/down ===== -->
  <g id="character">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-8; 0,0" dur="3s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>

    <!-- LEFT ARM + HAND: rotates at shoulder (289,381) -->
    <g id="left-arm-group">
      <animateTransform attributeName="transform" type="rotate"
        values="0,289,381; -22,289,381; 0,289,381; 14,289,381; 0,289,381"
        dur="1.6s" begin="0s" repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
        keyTimes="0;0.25;0.5;0.75;1"/>
      <rect x="216" y="372" width="73" height="18" rx="9" fill="#1a1a1a"/>
      <rect x="191" y="364" width="28" height="34" rx="12" fill="#FDE8C8" stroke="#E8D5B7" stroke-width="0.5"/>
      <ellipse cx="199" cy="364" rx="5" ry="5.5" fill="#FDE8C8" stroke="#E8D5B7" stroke-width="0.5"/>
      <ellipse cx="207" cy="362" rx="5" ry="5.5" fill="#FDE8C8" stroke="#E8D5B7" stroke-width="0.5"/>
      <ellipse cx="215" cy="363" rx="5" ry="5.5" fill="#FDE8C8" stroke="#E8D5B7" stroke-width="0.5"/>
    </g>

    <!-- RIGHT ARM + HAND + CUBE: rotates at shoulder (391,381) -->
    <g id="right-arm-group">
      <animateTransform attributeName="transform" type="rotate"
        values="0,391,381; 22,391,381; 0,391,381; -14,391,381; 0,391,381"
        dur="1.6s" begin="0.8s" repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
        keyTimes="0;0.25;0.5;0.75;1"/>
      <rect x="391" y="372" width="73" height="18" rx="9" fill="#1a1a1a"/>
      <rect x="462" y="362" width="28" height="36" rx="12" fill="#FDE8C8" stroke="#E8D5B7" stroke-width="0.5"/>
      <rect x="467" y="368" width="13" height="13" rx="1.5" fill="#c41212"/>
      <path d="M467 368 L472 363 L485 363 L480 368Z" fill="#9a0e0e"/>
      <path d="M480 368 L485 363 L485 376 L480 381Z" fill="#700b0b"/>
    </g>

    <!-- BODY -->
    <rect x="288" y="344" width="104" height="152" rx="22" fill="#1a1a1a"/>
    <rect x="300" y="371" width="80" height="32" rx="9" fill="#c41212"/>
    <rect x="308" y="380" width="9" height="9" rx="1" fill="white" opacity="0.85"/>
    <path d="M308 380 L311 376 L317 376 L317 380Z" fill="white" opacity="0.65"/>
    <text x="346" y="387" text-anchor="middle" dominant-baseline="central" fill="white" font-size="14" font-weight="bold" font-family="Montserrat,sans-serif">4DF</text>
    <circle cx="302" cy="432" r="3.5" fill="#c41212" opacity="0.55"/>
    <circle cx="378" cy="432" r="3.5" fill="#c41212" opacity="0.55"/>

