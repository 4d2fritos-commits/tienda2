      <rect x="286" y="100" width="28" height="115" rx="14" fill="#FDE8C8" stroke="#E8D5B7" stroke-width="0.5"/>
      <rect x="286" y="100" width="28" height="34" rx="14" fill="#F4C430"/>
      <line x1="289" y1="158" x2="311" y2="158" stroke="#E0C898" stroke-width="1" stroke-linecap="round"/>
      <line x1="290" y1="172" x2="310" y2="172" stroke="#E0C898" stroke-width="0.8" stroke-linecap="round"/>
