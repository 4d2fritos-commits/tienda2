  </g><!-- end character -->

  <!-- Caption -->
  <text x="340" y="536" text-anchor="middle" dominant-baseline="central" fill="#888" font-size="13" font-family="Montserrat,sans-serif">DEDITO · mascota oficial de 4 Dedos Fritos</text>

</svg>